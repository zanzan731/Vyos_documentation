global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'snmp'
    static_configs:
      - targets:
        - 192.168.11.1   # IP tvojega VyOS routerja
    metrics_path: /snmp
    params:
      module: [vyos]
      auth: [vyos_auth]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp_exporter:9116
